{% extends 'base.html' %}

{% block content %}

<style>
.fertilizer-container {
    width: 90%;
    margin: auto;
    display: flex;
    gap: 40px;
    padding: 40px 0;
}

.left-box, .right-box {
    width: 50%;
    padding: 20px;
    border-radius: 12px;
}

.left-box {
    background: #fefefe;
    box-shadow: 0 0 15px rgba(0,0,0,0.15);
}

.left-box form input, 
.left-box form select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #aaa;
    font-size: 16px;
}

.left-box button {
    width: 100%;
    padding: 14px;
    background: #008037;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
}

.left-box button:hover {
    background: #00692c;
}

.right-box {
    background: #eaffea;
    box-shadow: 0 0 15px rgba(0,0,0,0.15);
}

.prediction-text {
    font-size: 26px;
    font-weight: bold;
    color: #006400;
    margin-top: 20px;
}
</style>

<div class="fertilizer-container">
    
    <div class="left-box">
        <h2>Enter Crop Nutrient Values</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="number" name="Nitrogen" step="0.1" placeholder="Nitrogen (N)" required>
            <input type="number" name="Phosphorous" step="0.1" placeholder="Phosphorus (P)" required>
            <input type="number" name="Potassium" step="0.1" placeholder="Potassium (K)" required>
            <input type="number" name="Ph" step="0.1" placeholder="pH Value" required>
            <input type="number" name="Temperature" step="0.1" placeholder="Temperature" required>
            <input type="number" name="Humidity" step="0.1" placeholder="Humidity" required>
            <input type="number" name="Moisture" step="0.1" placeholder="Moisture" required>

            <select name="soil_type" required>
                <option value="">Select Soil Type</option>
                <option value="Loam">Loam</option>
                <option value="Sandy Loam">Sandy Loam</option>
                <option value="Silt Loam">Silt Loam</option>
                <option value="Clay Loam">Clay Loam</option>
                <option value="Sandy">Sandy</option>
                <option value="Clay">Clay</option>
                <option value="Loamy Sand">Loamy Sand</option>
            </select>

            <select name="crop_type" required>
                <option value="">Select Crop Type</option>
                <option value="Pigeonpea">Pigeonpea</option>
                <option value="Barley">Barley</option>
                <option value="Onion">Onion</option>
                <option value="Sesame">Sesame</option>
                <option value="Banana">Banana</option>
                <option value="Mango">Mango</option>
                <option value="Sunflower">Sunflower</option>
                <option value="Jute">Jute</option>
                <option value="Soybean">Soybean</option>
                <option value="Maize">Maize</option>
                <option value="Chilli">Chilli</option>
                <option value="Citrus">Citrus</option>
                <option value="Brinjal">Brinjal</option>
                <option value="Okra">Okra</option>
                <option value="Potato">Potato</option>
                <option value="Chickpea">Chickpea</option>
                <option value="Tobacco">Tobacco</option>
                <option value="Cotton">Cotton</option>
                <option value="Green Gram">Green Gram</option>
                <option value="Wheat">Wheat</option>
                <option value="Lentil">Lentil</option>
                <option value="Mustard">Mustard</option>
                <option value="Groundnut">Groundnut</option>
                <option value="Black Gram">Black Gram</option>
                <option value="Rice">Rice</option>
                <option value="Grapes">Grapes</option>
                <option value="Sugarcane">Sugarcane</option>
                <option value="Sorghum">Sorghum</option>
                <option value="Tomato">Tomato</option>
                <option value="Cabbage">Cabbage</option>
                <option value="Cauliflower">Cauliflower</option>
            </select>

            <button type="submit">Predict Fertilizer</button>
        </form>
    </div>

    
    <div class="right-box">
        <h2>Prediction Output</h2>

        {% if prediction %}
            <p class="prediction-text">Recommended Fertilizer: {{ prediction }}</p>
        {% else %}
            <p style="opacity: 0.8;">Fill the form to get the fertilizer recommendation.</p>
        {% endif %}
    </div>

</div>

{% endblock %}
