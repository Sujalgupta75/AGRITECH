<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* Reset some default styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff7b00, #ffaf40);
        }

        .container {
            background: #fff;
            width: 350px;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .container h2 {
            margin-bottom: 25px;
            color: #333;
            font-size: 26px;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-size: 14px;
            color: #444;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #ff7b00;
            box-shadow: 0 0 5px rgba(255, 123, 0, 0.5);
        }

        button {
            width: 100%;
            background: #ff7b00;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e76b00;
            transform: scale(1.02);
        }

        .register-link {
            margin-top: 20px;
            display: block;
            font-size: 14px;
            color: #555;
        }

        .register-link a {
            color: #ff7b00;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Responsive design */
        @media (max-width: 400px) {
            .container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? 
            <a href="{% url 'register' %}">Register</a>
        </div>
    </div>

</body>
</html>
